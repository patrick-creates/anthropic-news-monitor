name: Anthropic News Monitor

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write       # Required for GH Pages
  id-token: write    # Required for GH Pages
  models: read       # Required for GitHub Models verifier

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python monitor.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL:  ${{ secrets.TO_EMAIL }}
          # GITHUB_TOKEN is auto-injected by Actions. We surface it so
          # categorize.py can use it for the GitHub Models verifier call.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: override the model (default is openai/gpt-4o-mini)
          # GH_MODEL: openai/gpt-4o-mini

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update news data and index"
          file_pattern: 'seen_data.json index.html'
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
